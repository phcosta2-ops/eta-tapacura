name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Preparar site
        run: |
          mkdir -p _site
          if [ -f dashboard_final.html ]; then
            cp dashboard_final.html _site/index.html
          elif [ -f dashboard_completo.html ]; then
            cp dashboard_completo.html _site/index.html
          fi
          cp dados/dados_eta.json _site/dados_eta.json 2>/dev/null || echo "[]" > _site/dados_eta.json

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
