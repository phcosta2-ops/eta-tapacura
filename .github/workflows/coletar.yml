name: Coletar Dados ETA Tapacura

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Coletar dados
        env:
          ETA_USUARIO: ${{ secrets.ETA_USUARIO }}
          ETA_SENHA: ${{ secrets.ETA_SENHA }}
        run: |
          python coletor_completo.py

      - name: Salvar screenshot e debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-coleta
          path: |
            dados/ultimo_screenshot.png
            dados/debug_html.txt
          retention-days: 5

      - name: Commit dados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/dados_eta.json
          git diff --staged --quiet || git commit -m "Dados ETA $(date -u '+%Y-%m-%d %H:%M')"
          git push
