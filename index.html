<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ETA Tapacurá</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#020617;--bg2:rgba(15,23,42,.8);--border:rgba(100,116,139,.15);--t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--t4:#475569;
--cloro:#f59e0b;--cor:#eab308;--turb:#22c55e;--ph:#a855f7;--red:#ef4444;--green:#10b981;--orange:#fb923c}
body{background:linear-gradient(180deg,#020617,#0f172a 50%,#020617);color:var(--t1);font-family:system-ui,sans-serif;min-height:100vh}
.hdr{background:rgba(15,23,42,.95);border-bottom:1px solid rgba(100,116,139,.1);padding:16px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.hdr-logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#06b6d4);display:flex;align-items:center;justify-content:center;animation:glow 3s infinite}
.wrap{padding:20px 28px;max-width:1440px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.card{background:linear-gradient(135deg,rgba(15,23,42,.8),rgba(30,41,59,.6));border:1px solid var(--border);border-radius:16px;padding:20px 22px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.card.cloro::before{background:linear-gradient(90deg,transparent,var(--cloro),transparent)}
.card.cor::before{background:linear-gradient(90deg,transparent,var(--cor),transparent)}
.card.turb::before{background:linear-gradient(90deg,transparent,var(--turb),transparent)}
.card.ph::before{background:linear-gradient(90deg,transparent,var(--ph),transparent)}
.card.flash-orange{animation:flashC 1.5s infinite}
.card.flash-red{animation:flashR 2s infinite}
.c-label{font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.c-val{font-size:36px;font-weight:800;font-family:monospace;line-height:1}
.c-unit{font-size:14px;color:var(--t3);margin-left:6px}
.c-stats{font-size:9px;color:var(--t4);font-family:monospace;margin-top:8px;display:flex;justify-content:space-between}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.badge .dot{width:5px;height:5px;border-radius:50%}
.badge.normal{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.badge.normal .dot{background:var(--green)}
.badge.critico{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.badge.critico .dot{background:var(--red);animation:pulse 1s infinite}
.badge.drift{background:rgba(251,146,60,.15);color:var(--orange);border:1px solid rgba(251,146,60,.4)}
.badge.drift .dot{background:var(--orange);animation:pulse 1s infinite}
.badge.flash{animation:flashB .8s infinite}
.drift-msg{font-size:10px;color:var(--orange);font-family:monospace;margin-top:6px;animation:pulse 1.2s infinite}
.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px 22px;margin-bottom:20px}
.chart-box.flash-drift{border:1px solid rgba(251,146,60,.3);animation:flashC 2s infinite}
.tabs{display:flex;gap:8px;margin-bottom:22px}
.tab{background:transparent;border:1px solid var(--border);color:var(--t3);padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.tab.on{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.3);color:#60a5fa}
.rbtn{background:transparent;border:1px solid var(--border);color:var(--t3);padding:5px 14px;border-radius:6px;font-size:11px;cursor:pointer;font-family:monospace;font-weight:600}
.rbtn.on{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.3);color:#60a5fa}
.pbtn{background:transparent;border:1px solid rgba(100,116,139,.12);color:var(--t3);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:monospace}
.pbtn.on{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.25);color:#60a5fa}
.alert-item{display:flex;gap:12px;padding:10px 12px;border-radius:8px;margin-bottom:6px}
.alert-item.critico{background:rgba(239,68,68,.04);border:1px solid rgba(239,68,68,.12)}
.alert-item.drift{background:rgba(251,146,60,.04);border:1px solid rgba(251,146,60,.15)}
.alert-item.alerta{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12)}
.compliance-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(100,116,139,.06)}
.rec-item{display:flex;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px}
.drop{background:var(--bg2);border:2px dashed rgba(100,116,139,.2);border-radius:16px;padding:50px;text-align:center;cursor:pointer;margin-bottom:20px}
.drop:hover{border-color:var(--t3)}
.hidden{display:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes flashB{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes flashC{0%,100%{border-color:rgba(251,146,60,.4);box-shadow:none}50%{border-color:rgba(251,146,60,.8);box-shadow:0 0 20px rgba(251,146,60,.12)}}
@keyframes flashR{0%,100%{border-color:rgba(239,68,68,.2)}50%{border-color:rgba(239,68,68,.5);box-shadow:0 0 12px rgba(239,68,68,.08)}}
@keyframes glow{0%,100%{box-shadow:0 0 12px rgba(59,130,246,.15)}50%{box-shadow:0 0 24px rgba(59,130,246,.3)}}
@media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}.trends-grid{grid-template-columns:1fr!important}}
@media(max-width:500px){.cards{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center;gap:14px">
    <div class="hdr-logo"><svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg></div>
    <div><div style="font-size:16px;font-weight:800">ETA TAPACURÁ</div><div style="font-size:11px;color:var(--t3)">INSTRUMENTAÇÃO ANALÍTICA — COMPESA</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="driftBadge" class="hidden" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.2);animation:flashB 1.5s infinite">
      <span style="font-size:11px;color:var(--orange);font-weight:700;font-family:monospace" id="driftCount"></span>
    </div>
    <span style="font-size:11px;color:var(--t3);font-family:monospace" id="lastTime"></span>
    <button class="rbtn on" id="btn24h" onclick="setRange('24h')">24h</button>
    <button class="rbtn" id="btnAll" onclick="setRange('all')">Tudo</button>
    <span style="font-size:10px;color:var(--t4);font-family:monospace" id="totalPts"></span>
  </div>
</div>

<div class="wrap">
  <!-- Load screen -->
  <div id="loadScreen">
    <div class="drop" onclick="document.getElementById('fi').click()">
      <div style="font-size:16px;font-weight:600;margin-bottom:6px">Carregar dados_eta.json</div>
      <div style="font-size:12px;color:var(--t4)">Clique pra selecionar</div>
      <input id="fi" type="file" accept=".json" onchange="loadFile(event)" style="display:none">
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <div class="tabs">
      <button class="tab on" id="tabOverview" onclick="setTab('overview')">Visão Geral</button>
      <button class="tab" id="tabTrends" onclick="setTab('trends')">Tendências</button>
      <button class="tab" id="tabAlerts" onclick="setTab('alerts')">Alertas</button>
    </div>

    <!-- OVERVIEW -->
    <div id="viewOverview">
      <div class="cards" id="cardsGrid"></div>
      <div class="chart-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <span style="font-size:13px;font-weight:700;color:#cbd5e1">Evolução dos Parâmetros</span>
          <div style="display:flex;gap:6px" id="paramBtns"></div>
        </div>
        <canvas id="mainChart" height="300"></canvas>
      </div>
    </div>

    <!-- TRENDS -->
    <div id="viewTrends" class="hidden">
      <div class="trends-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="chart-box" id="trendCloro"><div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><div style="width:10px;height:10px;border-radius:3px;background:var(--cloro)"></div><span style="font-size:12px;font-weight:700;color:#cbd5e1">Cloro Residual (ppm)</span><span style="margin-left:auto;font-size:10px;color:var(--t4);font-family:monospace" id="trendCloroPts"></span></div><canvas id="chartCloro" height="220"></canvas></div>
        <div class="chart-box" id="trendCor"><div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><div style="width:10px;height:10px;border-radius:3px;background:var(--cor)"></div><span style="font-size:12px;font-weight:700;color:#cbd5e1">Cor Aparente (uC)</span><span style="margin-left:auto;font-size:10px;color:var(--t4);font-family:monospace" id="trendCorPts"></span></div><canvas id="chartCor" height="220"></canvas></div>
        <div class="chart-box" id="trendTurb"><div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><div style="width:10px;height:10px;border-radius:3px;background:var(--turb)"></div><span style="font-size:12px;font-weight:700;color:#cbd5e1">Turbidez (NTU)</span><span style="margin-left:auto;font-size:10px;color:var(--t4);font-family:monospace" id="trendTurbPts"></span></div><canvas id="chartTurb" height="220"></canvas></div>
        <div class="chart-box" id="trendPh"><div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><div style="width:10px;height:10px;border-radius:3px;background:var(--ph)"></div><span style="font-size:12px;font-weight:700;color:#cbd5e1">pH</span><span style="margin-left:auto;font-size:10px;color:var(--t4);font-family:monospace" id="trendPhPts"></span></div><canvas id="chartPh" height="220"></canvas></div>
      </div>
    </div>

    <!-- ALERTS -->
    <div id="viewAlerts" class="hidden">
      <div class="chart-box"><div style="font-size:13px;font-weight:700;color:#cbd5e1;margin-bottom:16px" id="alertTitle">Alertas</div><div id="alertList" style="max-height:350px;overflow-y:auto"></div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="chart-box"><div style="font-size:13px;font-weight:700;color:#cbd5e1;margin-bottom:16px">Conformidade Portaria 888</div><div id="complianceList"></div></div>
        <div class="chart-box"><div style="font-size:13px;font-weight:700;color:#cbd5e1;margin-bottom:16px">Recomendações</div><div id="recList"></div></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const P=["cloro_ppm","cor_uc","turbidez_ntu","ph"];
const LIM={cloro_ppm:{min:.2,max:5,unit:"ppm",label:"Cloro Residual"},cor_uc:{max:15,unit:"uC",label:"Cor Aparente"},turbidez_ntu:{max:.5,alerta:1,unit:"NTU",label:"Turbidez"},ph:{min:6,max:9.5,unit:"",label:"pH"}};
const COL={cloro_ppm:"#f59e0b",cor_uc:"#eab308",turbidez_ntu:"#22c55e",ph:"#a855f7"};
const CLS={cloro_ppm:"cloro",cor_uc:"cor",turbidez_ntu:"turb",ph:"ph"};
const fm=v=>v==null?"—":v.toFixed(2).replace(".",",");
let allData=null,rawColetas=null,curRange="24h",curTab="overview",curParam="all",charts={};

// Outlier limits per param (values beyond these are clearly wrong SVG conversions)
const OUTLIER={cloro_ppm:{min:-1,max:10},cor_uc:{min:-5,max:500},turbidez_ntu:{min:-1,max:50},ph:{min:0,max:14}};

function parse(raw){
  const S={cloro_ppm:[],cor_uc:[],turbidez_ntu:[],ph:[]};
  raw.forEach(c=>{
    if(c.series)Object.entries(c.series).forEach(([k,s])=>{let p=k;if(!S[p]){const l=k.toLowerCase();if(l.includes("cloro"))p="cloro_ppm";else if(l.includes("cor")&&!l.includes("corpo"))p="cor_uc";else if(l.includes("turb"))p="turbidez_ntu";else if(l.includes("ph")&&!l.includes("phone"))p="ph";}if(S[p]&&s.dados)s.dados.forEach(d=>{if(d.v!=null&&!isNaN(d.v)){const ol=OUTLIER[p];if(ol&&(d.v<ol.min||d.v>ol.max))return;S[p].push({t:new Date(d.t),v:d.v});}});});
    if(c.valores_atuais){const t=new Date(c.timestamp);P.forEach(p=>{if(c.valores_atuais[p]!=null)S[p].push({t,v:c.valores_atuais[p]});});}
  });
  Object.keys(S).forEach(k=>{S[k].sort((a,b)=>a.t-b.t);const seen=new Set();S[k]=S[k].filter(d=>{const key=d.t.getTime();if(seen.has(key))return false;seen.add(key);return true;});});
  return S;
}

function getFiltered(){
  if(!allData)return null;
  if(curRange==="all")return allData;
  const cut=Date.now()-24*36e5;const r={};
  P.forEach(p=>{r[p]=allData[p].filter(d=>d.t.getTime()>=cut);});return r;
}

function detectDrift(s){
  if(s.length<10)return null;const h=5;
  const now=s[s.length-1].t.getTime(),win=s.filter(d=>d.t.getTime()>=now-h*36e5);
  if(win.length<5)return null;
  let up=0,dn=0;for(let i=1;i<win.length;i++){if(win[i].v>win[i-1].v)up++;else if(win[i].v<win[i-1].v)dn++;}
  const tot=win.length-1,sv=win[0].v,ev=win[win.length-1].v,ch=Math.abs(ev-sv)/(Math.abs(sv)||1);
  if(up/tot>.75&&ch>.1)return{dir:"up",s:sv,e:ev,h};
  if(dn/tot>.75&&ch>.1)return{dir:"down",s:sv,e:ev,h};return null;
}

function getSt(p,v){if(v==null)return"falha";const l=LIM[p];if(l.min!=null&&v<l.min)return"critico";if(l.max!=null&&v>l.max)return"critico";if(l.alerta!=null&&v>l.alerta)return"critico";return"normal";}

function sample(arr,max){const step=Math.max(1,Math.floor(arr.length/max));return arr.filter((_,i)=>i%step===0);}

function render(){
  const S=getFiltered();if(!S)return;
  const drifts={};P.forEach(p=>{drifts[p]=detectDrift(allData[p]);});
  const driftCnt=Object.values(drifts).filter(Boolean).length;
  const totPts=P.reduce((s,p)=>s+S[p].length,0);

  document.getElementById("totalPts").textContent=totPts.toLocaleString("pt-BR")+" pts";
  if(driftCnt>0){document.getElementById("driftBadge").classList.remove("hidden");document.getElementById("driftBadge").style.display="flex";document.getElementById("driftCount").textContent=driftCnt+" drift";}
  else{document.getElementById("driftBadge").classList.add("hidden");}

  // Last reading timestamp
  let lastTs=null;
  P.forEach(p=>{const s=allData[p];if(s.length){const t=s[s.length-1].t;if(!lastTs||t>lastTs)lastTs=t;}});
  document.getElementById("lastTime").textContent=lastTs?lastTs.toLocaleString("pt-BR"):"—";

  // Cards - use valores_atuais from raw data as primary value source
  let latestVA={};
  if(rawColetas&&rawColetas.length){const last=rawColetas[rawColetas.length-1];if(last.valores_atuais)latestVA=last.valores_atuais;}

  let cardsHtml="";
  P.forEach(p=>{
    const l=LIM[p];const s=S[p];
    // Prefer valores_atuais (exact reading from screen) over SVG-derived last point
    const v=latestVA[p]!=null?latestVA[p]:(allData[p].length?allData[p][allData[p].length-1].v:null);
    const st=getSt(p,v);const dr=drifts[p];const eff=dr?"drift":st;
    const vals=s.map(d=>d.v);const mn=vals.length?Math.min(...vals):0;const mx=vals.length?Math.max(...vals):0;const avg=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
    const flashCls=dr?"flash-orange":st==="critico"?"flash-red":"";
    const topColor=dr?"var(--orange)":st==="critico"?"var(--red)":`var(--${CLS[p]})`;
    const badgeCls=eff+(dr||st==="critico"?" flash":"");
    const badgeText=eff==="normal"?"NORMAL":eff==="critico"?"CRÍTICO":eff==="drift"?"DRIFT":"S/DADOS";
    const timeStr=lastTs?lastTs.toLocaleString("pt-BR",{hour:"2-digit",minute:"2-digit",day:"2-digit",month:"2-digit"}):"";

    cardsHtml+=`<div class="card ${CLS[p]} ${flashCls}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <span class="c-label">${l.label}</span>
        <span class="badge ${badgeCls}"><span class="dot"></span>${badgeText}</span>
      </div>
      <div style="display:flex;align-items:baseline"><span class="c-val" style="color:${topColor}">${v!=null?fm(v):"—"}</span>${v!=null?`<span class="c-unit">${l.unit}</span>`:""}</div>
      ${dr?`<div class="drift-msg">${dr.dir==="up"?"↑ Subindo":"↓ Descendo"} há ${dr.h}h: ${fm(dr.s)}→${fm(dr.e)}</div>`:""}
      <div style="font-size:10px;color:var(--t4);font-family:monospace;margin-top:4px">${timeStr}</div>
      <div class="c-stats"><span>min ${fm(mn)}</span><span>avg ${fm(avg)}</span><span>max ${fm(mx)}</span><span>${s.length} pts</span></div>
    </div>`;
  });
  document.getElementById("cardsGrid").innerHTML=cardsHtml;

  // Main chart
  renderMainChart(S);

  // Param buttons
  let btnsHtml=`<button class="pbtn ${curParam==="all"?"on":""}" onclick="setParam('all')">Todos</button>`;
  P.forEach(p=>{btnsHtml+=`<button class="pbtn ${curParam===p?"on":""}" onclick="setParam('${p}')">${LIM[p].label.split(" ")[0]}</button>`;});
  document.getElementById("paramBtns").innerHTML=btnsHtml;

  // Trend charts
  P.forEach(p=>{
    const data=sample(S[p],400);
    const el=document.getElementById("trend"+({cloro_ppm:"Cloro",cor_uc:"Cor",turbidez_ntu:"Turb",ph:"Ph"}[p]));
    if(drifts[p]){el.classList.add("chart-box","flash-drift");}else{el.classList.remove("flash-drift");}
    document.getElementById("trend"+({cloro_ppm:"Cloro",cor_uc:"Cor",turbidez_ntu:"Turb",ph:"Ph"}[p])+"Pts").textContent=data.length+" pts";
    renderTrendChart(p,data);
  });

  // Alerts
  const anomalies=[];
  P.forEach(p=>{const s=S[p];const l=LIM[p];
    s.forEach(d=>{if(l.max!=null&&d.v>l.max)anomalies.push({t:d.t,lv:"critico",msg:`${l.label} acima: ${fm(d.v)} ${l.unit} (máx ${l.max})`});if(l.min!=null&&d.v<l.min)anomalies.push({t:d.t,lv:"critico",msg:`${l.label} abaixo: ${fm(d.v)} ${l.unit} (mín ${l.min})`});});
    if(drifts[p])anomalies.unshift({t:allData[p][allData[p].length-1]?.t||new Date(),lv:"drift",msg:`${l.label} DRIFT ${drifts[p].dir==="up"?"↑":"↓"} há ${drifts[p].h}h: ${fm(drifts[p].s)}→${fm(drifts[p].e)} ${l.unit}`});
  });
  anomalies.sort((a,b)=>b.t-a.t);

  document.getElementById("alertTitle").textContent=`Alertas (${anomalies.length})`;
  if(anomalies.length===0){document.getElementById("alertList").innerHTML='<div style="font-size:12px;color:var(--t4)">✓ Tudo normal</div>';}
  else{document.getElementById("alertList").innerHTML=anomalies.slice(0,25).map(a=>`<div class="alert-item ${a.lv}"><span style="min-width:100px;font-size:10px;font-family:monospace;color:var(--t3)">${a.t.toLocaleString("pt-BR")}</span><div><span class="badge ${a.lv}${a.lv==="drift"?" flash":""}"><span class="dot"></span>${a.lv==="critico"?"CRÍTICO":"DRIFT"}</span><div style="font-size:12px;color:#cbd5e1;margin-top:4px;line-height:1.5">${a.msg}</div></div></div>`).join("");}

  // Compliance
  let compHtml="";
  P.forEach((p,i)=>{const l=LIM[p];let viol=0;S[p].forEach(d=>{if(l.min!=null&&d.v<l.min)viol++;if(l.max!=null&&d.v>l.max)viol++;});const ok=viol===0;
    compHtml+=`<div class="compliance-row" ${i===3?'style="border:none"':''}>
      <div><div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px;font-weight:600;color:#cbd5e1">${l.label}</span>${drifts[p]?'<span class="badge drift flash"><span class="dot"></span>DRIFT</span>':''}</div>
      <div style="font-size:10px;color:var(--t4)">${ok?"Conforme":viol+" violações"}</div></div>
      <span style="color:${ok?"var(--green)":"var(--red)"}">${ok?"✓":"⚠"}</span></div>`;
  });
  document.getElementById("complianceList").innerHTML=compHtml;

  // Recommendations
  const dR={cloro_ppm:"Incrustação no sensor. Limpeza.",cor_uc:"Saturação do filtro. Retrolavagem.",turbidez_ntu:"Retrolavagem dos filtros.",ph:"Verificar bombas dosadoras."};
  const uR={cloro_ppm:"Verificar dosagem e calibração.",cor_uc:"Avaliar coagulante.",turbidez_ntu:"Verificar filtros.",ph:"Ajustar cal/ácido."};
  let recHtml="";
  P.forEach(p=>{const l=LIM[p];const hasDr=!!drifts[p];let viol=0;S[p].forEach(d=>{if(l.min!=null&&d.v<l.min)viol++;if(l.max!=null&&d.v>l.max)viol++;});
    const color=hasDr?"var(--orange)":viol>0?"var(--red)":"var(--green)";const tag=hasDr?"DRIFT":viol>0?"URGENTE":"OK";const msg=hasDr?dR[p]:viol>0?uR[p]:"Conforme.";
    recHtml+=`<div class="rec-item" style="background:${hasDr?"rgba(251,146,60,.04)":viol>0?"rgba(239,68,68,.04)":"rgba(22,163,74,.04)"};border:1px solid ${hasDr?"rgba(251,146,60,.12)":viol>0?"rgba(239,68,68,.12)":"rgba(22,163,74,.12)"}">
      <span style="font-size:9px;font-weight:800;color:${color};min-width:50px;font-family:monospace">${tag}</span>
      <span style="font-size:11px;color:var(--t2);line-height:1.5"><b>${l.label}:</b> ${msg}</span></div>`;
  });
  document.getElementById("recList").innerHTML=recHtml;
}

function renderMainChart(S){
  const merged=new Set();P.forEach(p=>{if(curParam==="all"||curParam===p)S[p].forEach(d=>merged.add(d.t.getTime()));});
  const sorted=[...merged].sort((a,b)=>a-b);
  const sampled=sample(sorted,300);
  const labels=sampled.map(ts=>new Date(ts).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}));
  const datasets=[];

  P.forEach(p=>{
    if(curParam!=="all"&&curParam!==p)return;
    const s=S[p];
    const data=sampled.map(ts=>{let best=null,bd=1e15;for(let i=0;i<s.length;i++){const d=Math.abs(s[i].t.getTime()-ts);if(d<bd){bd=d;best=i;}}return best!=null&&bd<72e5?s[best].v:null;});
    datasets.push({label:LIM[p].label,data,borderColor:COL[p],backgroundColor:COL[p]+"15",tension:.3,pointRadius:0,borderWidth:1.5,fill:false,yAxisID:p==="cor_uc"&&curParam==="all"?"right":"left"});
  });

  if(charts.main)charts.main.destroy();
  charts.main=new Chart(document.getElementById("mainChart"),{type:"line",data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:"index"},plugins:{legend:{display:false},tooltip:{backgroundColor:"rgba(15,23,42,.95)",titleColor:"#94a3b8",bodyColor:"#e2e8f0",borderColor:"rgba(100,116,139,.3)",borderWidth:1,cornerRadius:8,padding:10}},scales:{left:{position:"left",ticks:{color:"#475569",font:{family:"monospace",size:10}},grid:{color:"rgba(100,116,139,.08)"}},right:{position:"right",display:curParam==="all",ticks:{color:"#475569",font:{family:"monospace",size:10}},grid:{display:false}},x:{ticks:{color:"#475569",font:{family:"monospace",size:9},maxTicksLimit:8},grid:{color:"rgba(100,116,139,.08)"}}}}});
}

function renderTrendChart(p,data){
  const id="chart"+({cloro_ppm:"Cloro",cor_uc:"Cor",turbidez_ntu:"Turb",ph:"Ph"}[p]);
  const labels=data.map(d=>d.t.toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}));
  const vals=data.map(d=>d.v);
  const l=LIM[p];

  if(charts[id])charts[id].destroy();
  const datasets=[{label:l.label,data:vals,borderColor:COL[p],backgroundColor:COL[p]+"20",tension:.3,pointRadius:0,borderWidth:2,fill:true}];
  if(l.max!=null)datasets.push({label:"Máx",data:Array(vals.length).fill(l.max),borderColor:"#ef444466",borderDash:[5,5],borderWidth:1,pointRadius:0,fill:false});
  if(l.min!=null)datasets.push({label:"Mín",data:Array(vals.length).fill(l.min),borderColor:"#ef444444",borderDash:[4,6],borderWidth:1,pointRadius:0,fill:false});

  charts[id]=new Chart(document.getElementById(id),{type:"line",data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:"index"},plugins:{legend:{display:false},tooltip:{backgroundColor:"rgba(15,23,42,.95)",titleColor:"#94a3b8",bodyColor:"#e2e8f0",borderColor:COL[p],borderWidth:1,cornerRadius:8}},scales:{y:{ticks:{color:"#475569",font:{family:"monospace",size:9}},grid:{color:"rgba(100,116,139,.06)"}},x:{ticks:{color:"#475569",font:{family:"monospace",size:8},maxTicksLimit:6},grid:{color:"rgba(100,116,139,.06)"}}}}});
}

function setRange(r){curRange=r;document.getElementById("btn24h").className="rbtn"+(r==="24h"?" on":"");document.getElementById("btnAll").className="rbtn"+(r==="all"?" on":"");render();}
function setParam(p){curParam=p;render();}
function setTab(t){
  curTab=t;
  ["overview","trends","alerts"].forEach(x=>{
    document.getElementById("view"+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle("hidden",x!==t);
    document.getElementById("tab"+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle("on",x===t);
  });
}

function loadFile(e){const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(Array.isArray(d)){rawColetas=d;allData=parse(d);document.getElementById("loadScreen").classList.add("hidden");document.getElementById("app").classList.remove("hidden");render();}}catch(x){alert("Erro: "+x.message)}};r.readAsText(f);}

function loadData(d){if(Array.isArray(d)&&d.length){rawColetas=d;allData=parse(d);document.getElementById("loadScreen").classList.add("hidden");document.getElementById("app").classList.remove("hidden");render();}}

// Auto-load from same folder (GitHub Pages)
fetch("dados_eta.json?_="+Date.now()).then(r=>r.ok?r.json():null).then(d=>{if(d)loadData(d);}).catch(()=>{});
// Also try from dados/ subfolder
fetch("dados/dados_eta.json?_="+Date.now()).then(r=>r.ok?r.json():null).then(d=>{if(d&&!allData)loadData(d);}).catch(()=>{});
// Auto-refresh every 5 min
setInterval(()=>{
  fetch("dados_eta.json?_="+Date.now()).then(r=>r.ok?r.json():null).then(d=>{if(d)loadData(d);}).catch(()=>{});
},300000);
</script>
